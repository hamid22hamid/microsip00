name: Build MicroSIP

on:
  workflow_dispatch:  # Build UNIQUEMENT sur déclenchement manuel (Actions → Run workflow)

env:
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: Win32

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2
      with:
        msbuild-architecture: x86

    - name: Install Dependencies
      shell: pwsh
      run: |
        choco install 7zip -y
        choco install innosetup -y

    - name: Setup Directory Structure
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"
        Set-Location ".."
        Write-Host "Setting up directory structure..."
        $pjPaths = @(
            "pjlib/include/pj", "pjlib/lib",
            "pjsip/include/pjsip", "pjsip/lib",
            "pjmedia/include/pjmedia", "pjmedia/lib",
            "pjnath/include/pjnath", "pjnath/lib",
            "pjlib-util/include/pjlib-util", "pjlib-util/lib",
            "third_party/lib",
            "third_party/openssl/Win32/include", "third_party/openssl/Win32/lib",
            "third_party/ipp/Win32", "third_party/opus/Win32",
            "third_party/silk/Win32/Release", "third_party/ffmpeg/Win32",
            "third_party/vpx/Win32", "third_party/sdl/Win32",
            "third_party/opencore-amrnb/Win32", "third_party/vo-amrwbenc/Win32",
            "third_party/opencore-amrwb/Win32", "third_party/hid/Win32",
            "lib"
        )
        foreach ($path in $pjPaths) {
            New-Item -ItemType Directory -Force -Path $path | Out-Null
        }
        Write-Host "Directory structure created"

    - name: Download and Build PJSIP
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"
        Set-Location ".."
        if (Test-Path "pjproject/lib/pjlib-i386-Win32-vc14-Release.lib") {
            Write-Host "PJSIP already built, skipping..."
            exit 0
        }
        Write-Host "Downloading PJSIP..."
        $pjsipVersion = "2.15.1"
        $pjsipUrl = "https://github.com/pjsip/pjproject/archive/refs/tags/$pjsipVersion.zip"
        try {
            Invoke-WebRequest -Uri $pjsipUrl -OutFile "pjproject.zip" -TimeoutSec 120
            Expand-Archive -Path "pjproject.zip" -DestinationPath "." -Force
            if (Test-Path "pjproject-$pjsipVersion") {
                Remove-Item -Recurse -Force "pjproject" -ErrorAction SilentlyContinue
                Rename-Item "pjproject-$pjsipVersion" "pjproject" -Force
            }
        } catch {
            Write-Host "Failed to download PJSIP: $_"
            exit 1
        }
        Set-Location "pjproject"
        Write-Host "Configuring PJSIP..."
        $configLines = @(
          '#ifndef __PJ_CONFIG_SITE_H__',
          '#define __PJ_CONFIG_SITE_H__',
          '#define PJ_CONFIG_MICROSIP 1',
          '#define PJMEDIA_HAS_VIDEO 1',
          '#define PJMEDIA_HAS_FFMPEG 0',
          '#define PJMEDIA_HAS_VPX 0',
          '#define PJMEDIA_HAS_OPUS 0',
          '#define PJMEDIA_HAS_SILK 0',
          '#define PJMEDIA_HAS_G722 1',
          '#define PJMEDIA_HAS_G7221 1',
          '#define PJMEDIA_HAS_G726 1',
          '#define PJMEDIA_HAS_G729 0',
          '#define PJMEDIA_HAS_GSM 1',
          '#define PJMEDIA_HAS_SPEEX 1',
          '#define PJMEDIA_HAS_ILBC 1',
          '#define PJMEDIA_HAS_SRTP 1',
          '#define PJMEDIA_HAS_TLS 1',
          '#define PJMEDIA_HAS_WEBRTC_AEC 0',
          '#define PJMEDIA_HAS_WEBRTC_VAD 0',
          '#include <pj/config_site_sample.h>',
          '#endif'
        )
        Set-Content -Path "pjlib/include/pj/config_site.h" -Value $configLines

        # [FIX] Forcer le toolset v143 dans les props de PJSIP (sinon il reste en v140)
        Write-Host "Patching PJSIP toolset to v143..."
        $propsFile = "build\vs\pjproject-vs14-common-config.props"
        if (Test-Path $propsFile) {
            $content = Get-Content $propsFile -Raw
            # Remplace toute valeur de PlatformToolset par v143
            $content = $content -replace '<PlatformToolset>[^<]*</PlatformToolset>', '<PlatformToolset>v143</PlatformToolset>'
            Set-Content -Path $propsFile -Value $content
            Write-Host "Patched $propsFile"
            Write-Host "Content check:"
            Select-String -Path $propsFile -Pattern "PlatformToolset"
        } else {
            Write-Host "Props file not found, will rely on command-line toolset"
        }

        # [FIX RUNTIME] MicroSIP est compile en /MT (MultiThreaded statique).
        # PJSIP par defaut est en /MD. Il FAUT que les deux matchent, sinon
        # erreurs de lien (__imp___stricmp, __except_handler4_common).
        # On patche les props PJSIP pour forcer RuntimeLibrary = MultiThreaded (/MT).
        Write-Host "Patching PJSIP runtime to /MT (MultiThreaded)..."
        $rtFiles = @(
            "build\vs\pjproject-vs14-common-defaults.props",
            "build\vs\pjproject-vs14-common-config.props",
            "build\vs\pjproject-vs14-release-defaults.props"
        )
        foreach ($rf in $rtFiles) {
            if (Test-Path $rf) {
                $rc = Get-Content $rf -Raw
                # MultiThreadedDLL -> MultiThreaded (release) ; DebugDLL -> Debug
                $rc = $rc -replace '<RuntimeLibrary>MultiThreadedDLL</RuntimeLibrary>', '<RuntimeLibrary>MultiThreaded</RuntimeLibrary>'
                $rc = $rc -replace '<RuntimeLibrary>MultiThreadedDebugDLL</RuntimeLibrary>', '<RuntimeLibrary>MultiThreadedDebug</RuntimeLibrary>'
                Set-Content -Path $rf -Value $rc
                Write-Host "  patched runtime in $rf"
            }
        }

        Write-Host "Building PJSIP with MSBuild..."
        # PJSIP 2.15.1 : pjproject-vs14.sln. On FORCE v143 + SDK 10 pour windows-latest.
        # MicroSIP a besoin de libpjproject (le .lib UNIFIE), donc on construit cette cible.
        if (Test-Path "pjproject-vs14.sln") {
            # libpjproject agrege TOUT PJSIP (pjlib, pjmedia, pjsip, pjnath, codecs)
            # en un seul gros .lib. C'est LA cible dont MicroSIP a besoin.
            # On la construit SANS /m (sequentiel) pour voir clairement toute erreur.
            Write-Host "Building libpjproject target (lib unifiee, sequentiel)..."
            msbuild "pjproject-vs14.sln" /t:libpjproject `
                /p:Configuration=Release-Static /p:Platform=Win32 `
                /p:PlatformToolset=v143 `
                /p:WindowsTargetPlatformVersion=10.0 `
                /p:RuntimeLibrary=MultiThreaded
            $pjExit = $LASTEXITCODE
            Write-Host "libpjproject exit code: $pjExit"
            # Aussi pjsua_lib pour etre sur d'avoir la sous-lib pjsua
            Write-Host "Building pjsua_lib target..."
            msbuild "pjproject-vs14.sln" /t:pjsua_lib `
                /p:Configuration=Release-Static /p:Platform=Win32 `
                /p:PlatformToolset=v143 `
                /p:WindowsTargetPlatformVersion=10.0 `
                /p:RuntimeLibrary=MultiThreaded
        } else {
            Write-Host "ERROR: pjproject-vs14.sln not found!"
            Get-ChildItem -Filter "*.sln"
            exit 1
        }
        Write-Host "PJSIP build step done"
        # Lister TOUTES les .lib produites (pour diagnostic)
        Write-Host "=== Toutes les .lib produites par PJSIP ==="
        Get-ChildItem -Path "." -Filter "*.lib" -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "  $($_.Name)  [$([math]::Round($_.Length/1KB,0)) KB]"
        }

    - name: Copy PJSIP Libraries
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"
        Set-Location ".."
        Write-Host "Setting up PJSIP at locations expected by microsip.vcxproj..."
        $pjRoot = "pjproject"
        if (-not (Test-Path $pjRoot)) {
            Write-Host "ERROR: dossier pjproject introuvable!"
            Get-ChildItem -Directory | ForEach-Object { Write-Host "  dir: $($_.Name)" }
            exit 1
        }
        # Copier chaque module PJSIP (headers + sources) au niveau racine
        # pour matcher les chemins ..\pjlib\include etc. du vcxproj
        $modules = @("pjlib", "pjlib-util", "pjnath", "pjmedia", "pjsip", "third_party")
        foreach ($m in $modules) {
            if (Test-Path "$pjRoot\$m") {
                Write-Host "Copying module $m..."
                Copy-Item -Path "$pjRoot\$m" -Destination "." -Recurse -Force
            } else {
                Write-Host "  WARNING: $pjRoot\$m introuvable"
            }
        }
        # Rassembler toutes les .lib dans lib\
        New-Item -ItemType Directory -Force -Path "lib" | Out-Null
        $libCount = 0
        Get-ChildItem -Path "$pjRoot" -Filter "*.lib" -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName -Destination "lib\" -Force
            $libCount++
        }
        Write-Host "Total .lib copiees: $libCount"
        Write-Host ""

        # === Creer la lib UNIFIEE libpjproject-i386-Win32-vc14-Release-Static.lib ===
        # MicroSIP lie contre ce gros .lib unique. Si la cible libpjproject ne l'a
        # pas produit, on le FABRIQUE en fusionnant toutes les sous-libs PJSIP via lib.exe.
        $targetName = "libpjproject-i386-Win32-vc14-Release-Static.lib"
        $existing = Get-ChildItem -Path "lib" -Filter "libpjproject*.lib" -ErrorAction SilentlyContinue | Select-Object -First 1
        if ($existing) {
            Write-Host "Lib unifiee deja presente: $($existing.Name)"
            if ($existing.Name -ne $targetName) {
                Copy-Item $existing.FullName -Destination "lib\$targetName" -Force
                Write-Host "  copiee sous le nom attendu: $targetName"
            }
        } else {
            Write-Host "Lib unifiee absente -> fusion des sous-libs via lib.exe..."
            # Trouver lib.exe (MSVC)
            $libExe = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio\2022" -Filter "lib.exe" -Recurse -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -match "HostX86\\x86" } | Select-Object -First 1
            if (-not $libExe) {
                $libExe = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio\2022" -Filter "lib.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            }
            Write-Host "lib.exe: $($libExe.FullName)"
            # Lister toutes les sous-libs PJSIP a fusionner (exclure les *test* et la cible elle-meme)
            $subLibs = Get-ChildItem -Path "lib" -Filter "*.lib" -ErrorAction SilentlyContinue |
                Where-Object { $_.Name -notmatch "test" -and $_.Name -notmatch "libpjproject" } |
                ForEach-Object { "`"$($_.FullName)`"" }
            Write-Host "Sous-libs a fusionner: $($subLibs.Count)"
            $outLib = (Resolve-Path "lib").Path + "\" + $targetName
            $argList = "/OUT:`"$outLib`" " + ($subLibs -join " ")
            $proc = Start-Process -FilePath $libExe.FullName -ArgumentList $argList -NoNewWindow -Wait -PassThru
            if (Test-Path $outLib) {
                Write-Host "  OK: $targetName cree ($([math]::Round((Get-Item $outLib).Length/1MB,1)) MB)"
            } else {
                Write-Host "  ECHEC creation lib unifiee (exit $($proc.ExitCode))"
            }
        }
        Write-Host ""
        Write-Host "=== VERIFICATION pjsua.h ==="
        $pjsuaPath = "pjsip\include\pjsua-lib\pjsua.h"
        if (Test-Path $pjsuaPath) {
            Write-Host "  OK: $pjsuaPath EXISTE"
        } else {
            Write-Host "  MANQUANT: $pjsuaPath"
            Write-Host "  Recherche de pjsua.h n'importe ou..."
            Get-ChildItem -Path "." -Filter "pjsua.h" -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
                Write-Host "    trouve: $($_.FullName)"
            }
        }
        Write-Host ""
        Write-Host "=== Contenu de lib\ ==="
        Get-ChildItem -Path "lib\*.lib" -ErrorAction SilentlyContinue | Select-Object -First 30 | ForEach-Object {
            Write-Host "  $($_.Name)"
        }

    - name: Build MicroSIP
      working-directory: ${{ github.workspace }}
      shell: pwsh
      run: |
        Write-Host "Building MicroSIP..."
        msbuild microsip.vcxproj `
            /p:Configuration=${{env.BUILD_CONFIGURATION}} `
            /p:Platform=${{env.BUILD_PLATFORM}} `
            /p:PlatformToolset=v143 `
            /m
        if ($LASTEXITCODE -ne 0) {
            Write-Host "MicroSIP build failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
        }
        Write-Host "MicroSIP build completed successfully"

    - name: Prepare Output
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"
        New-Item -ItemType Directory -Force -Path "output" | Out-Null
        if (Test-Path "Release/microsip.exe") {
            Copy-Item "Release/microsip.exe" -Destination "output/" -Force
            Write-Host "Copied microsip.exe"
        } else {
            Write-Host "Warning: microsip.exe not found in Release/"
            Get-ChildItem -Path "Release/" -ErrorAction SilentlyContinue
        }
        if (Test-Path "Release/*.dll") {
            Copy-Item "Release/*.dll" -Destination "output/" -Force
        }
        Get-ChildItem -Path "output" -Recurse | ForEach-Object {
            Write-Host "  $($_.FullName)"
        }

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MicroSIP-Build
        path: ${{ github.workspace }}/output/

    - name: Create Portable ZIP
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"
        if (Test-Path "output/microsip.exe") {
            Compress-Archive -Path "output/*" -DestinationPath "MicroSIP-portable.zip" -Force
            Write-Host "Created portable ZIP archive"
        }

    - name: Upload Portable Archive
      uses: actions/upload-artifact@v4
      with:
        name: MicroSIP-Portable
        path: ${{ github.workspace }}/MicroSIP-*.zip

    # ══════════════════════════════════════════════════════════
    # INSTALLER WINDOWS — MicroSIP-IVR-Setup.exe
    # Tout inclus : MicroSIP, Node.js, Live Panel, WAVs
    # Les agents double-cliquent, tout est prêt.
    # ══════════════════════════════════════════════════════════

    - name: Setup Node.js 20 LTS (for npm install)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Prepare Live Panel files
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"
        Write-Host "Préparation du Live Panel..."
        New-Item -ItemType Directory -Force -Path "installer\livepanel\public" | Out-Null

        # Copier les fichiers du live panel depuis le repo
        if (Test-Path "livepanel\server.js") {
            Copy-Item "livepanel\server.js"         "installer\livepanel\"
            Copy-Item "livepanel\package.json"      "installer\livepanel\"
            Copy-Item "livepanel\public\index.html" "installer\livepanel\public\"
            Write-Host "Fichiers Live Panel copiés depuis livepanel/"
        } else {
            Write-Host "ERREUR: dossier livepanel/ introuvable dans le repo!"
            Write-Host "Créez le dossier livepanel/ avec server.js, package.json, public/index.html"
            exit 1
        }

        # Installer les dépendances npm (better-sqlite3 compile des binaires natifs)
        Write-Host "Installation des dépendances npm (SQLite, express, ws)..."
        Set-Location "installer\livepanel"
        npm install --production 2>&1
        if ($LASTEXITCODE -ne 0) { Write-Host "npm install failed"; exit 1 }
        Write-Host "npm install OK"
        Set-Location "${{ github.workspace }}"

        # Vérifier que better-sqlite3 est bien installé
        if (Test-Path "installer\livepanel\node_modules\better-sqlite3") {
            Write-Host "✅ better-sqlite3 installé"
        } else {
            Write-Host "⚠ better-sqlite3 absent"
        }

    - name: Download Node.js 20 portable (bundle avec l'installateur)
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"
        Write-Host "Téléchargement de Node.js 20 LTS portable..."
        # Doit correspondre EXACTEMENT à la version utilisée pour npm install
        $nodeVer = "20.19.2"
        $nodeUrl = "https://nodejs.org/dist/v$nodeVer/node-v$nodeVer-win-x64.zip"
        Invoke-WebRequest -Uri $nodeUrl -OutFile "installer\node.zip" -TimeoutSec 120
        Expand-Archive "installer\node.zip" -DestinationPath "installer\node_extracted" -Force
        $extracted = Get-ChildItem "installer\node_extracted" -Directory | Select-Object -First 1
        if ($extracted) {
            Move-Item $extracted.FullName "installer\node" -Force
            Write-Host "✅ Node.js portable: installer\node"
        } else {
            Write-Host "ERREUR: extraction Node.js échouée"
            exit 1
        }
        Remove-Item "installer\node.zip" -Force

    - name: Use WAV files from repo
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"
        Write-Host "Vérification des fichiers WAV dans installer/wav/..."
        $required = @(
            "installer\wav\demande_telephone.wav",
            "installer\wav\demande_poste.wav",
            "installer\wav\demande_classe.wav",
            "installer\wav\demande_groupe.wav"
        )
        $missing = $false
        foreach ($f in $required) {
            if (Test-Path $f) {
                $size = [math]::Round((Get-Item $f).Length / 1KB, 0)
                Write-Host "  ✅ $f ($size KB)"
            } else {
                Write-Host "  ❌ MANQUANT: $f"
                $missing = $true
            }
        }
        if ($missing) {
            Write-Host ""
            Write-Host "ERREUR: Des fichiers WAV manquent dans installer/wav/"
            Write-Host "Uploadez vos 4 fichiers WAV dans ce dossier sur GitHub."
            Write-Host "Format requis: 16-bit, mono, 16000 Hz, PCM"
            exit 1
        }
        Write-Host "Tous les WAVs sont présents ✅"

    - name: Copy installer scripts
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"
        # Copier Lancer-IVR.vbs et setup.iss depuis le repo
        if (Test-Path "installer\Lancer-IVR.vbs") {
            Write-Host "Lancer-IVR.vbs présent"
        } else {
            Write-Host "ERREUR: installer\Lancer-IVR.vbs manquant dans le repo!"
            exit 1
        }
        if (Test-Path "installer\setup.iss") {
            Write-Host "setup.iss présent"
        } else {
            Write-Host "ERREUR: installer\setup.iss manquant dans le repo!"
            exit 1
        }

    - name: Build Windows Installer
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"
        New-Item -ItemType Directory -Force -Path "installer\output" | Out-Null
        Write-Host "Construction de l'installateur Windows..."

        $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup non trouvé, installation..."
            choco install innosetup -y --no-progress
        }

        & $iscc "installer\setup.iss"

        if ($LASTEXITCODE -ne 0) {
            Write-Host "ERREUR: Inno Setup a échoué (code $LASTEXITCODE)"
            exit 1
        }

        $installer = Get-ChildItem "installer\output\*.exe" | Select-Object -First 1
        if ($installer) {
            Write-Host "✅ Installateur créé: $($installer.Name) ($([math]::Round($installer.Length/1MB,1)) MB)"
        } else {
            Write-Host "ERREUR: fichier .exe non trouvé dans installer\output\"
            exit 1
        }

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: MicroSIP-IVR-Setup
        path: ${{ github.workspace }}/installer/output/*.exe

